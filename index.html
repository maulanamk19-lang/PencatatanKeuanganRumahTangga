<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas Smart</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-white min-h-screen">

<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Login</h2>
    <select id="userSelect" class="border p-2 w-full mb-3 text-black">
      <option value="Maul">Maul</option>
      <option value="Ninda">Ninda</option>
    </select>
    <input type="password" id="pinInput" placeholder="PIN"
      class="border p-2 w-full mb-3 text-black">
    <button onclick="login()" class="bg-blue-600 text-white p-2 w-full rounded-lg">Masuk</button>
  </div>
</div>

<div id="appPage" class="hidden max-w-5xl mx-auto p-4">

<div class="flex justify-between items-center mb-4">
  <h1 class="text-2xl font-bold">Smart Finance</h1>
  <div>
    <button onclick="toggleDark()" class="bg-gray-700 text-white px-3 py-1 rounded-lg">🌙</button>
    <button onclick="logout()" class="text-red-500 ml-3">Logout</button>
  </div>
</div>

<div class="grid md:grid-cols-4 gap-4 mb-4">
  <div class="bg-red-500 text-white p-4 rounded-xl">
    <div>Pengeluaran</div>
    <div id="totalOut" class="text-xl font-bold">0</div>
  </div>
  <div class="bg-green-500 text-white p-4 rounded-xl">
    <div>Pemasukan</div>
    <div id="totalIn" class="text-xl font-bold">0</div>
  </div>
  <div class="bg-purple-600 text-white p-4 rounded-xl">
    <div>Prediksi 3 Bulan</div>
    <div id="prediksi" class="text-xl font-bold">0</div>
  </div>
  <div class="bg-blue-600 text-white p-4 rounded-xl">
    <div>Dana Darurat (12x)</div>
    <div id="danaDarurat" class="text-xl font-bold">0</div>
  </div>
</div>

<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow mb-4">
<h3 class="font-semibold mb-2">Tambah Transaksi</h3>
<select id="tipe" class="border p-2 w-full mb-2 text-black">
<option value="Pengeluaran">Pengeluaran</option>
<option value="Pemasukan">Pemasukan</option>
</select>
<input type="date" id="tanggal" class="border p-2 w-full mb-2 text-black">
<input type="text" id="keterangan" placeholder="Keterangan"
class="border p-2 w-full mb-2 text-black">
<input type="number" id="jumlah" placeholder="Jumlah"
class="border p-2 w-full mb-2 text-black">
<button onclick="tambahTransaksi()" class="bg-blue-600 text-white p-2 w-full rounded-lg">Simpan</button>
</div>

<button onclick="exportPDF()" class="bg-green-600 text-white px-3 py-1 rounded-lg mb-3">Export PDF</button>

<div class="grid md:grid-cols-2 gap-4 mb-4">
  <canvas id="chartKategori"></canvas>
  <canvas id="chartVs"></canvas>
</div>

<canvas id="trendChart" class="mb-4"></canvas>

<div id="riwayat" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow"></div>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbw5MNn27Fopx3dp7H5nKcGmqK4xDTzS2m53JVEhKzfzn9GPHxuFtgRXClFsHLtgGVug/exec";
let currentUser="";
let chart1,chart2,chart3;

const PIN_HASH={
"Maul":"41c991eb6a66242c0454191244278183ce58cf4a6bcd372f799e4b9cc01886af",
"Ninda":"d54123de468bd42ea00dafbd777f85fe5fa1ff6404d9838c007953c25c92a1c5"
};

window.onload=function(){
const saved=localStorage.getItem("bk_user");
if(saved){
currentUser=saved;
loginPage.classList.add("hidden");
appPage.classList.remove("hidden");
loadData();
}
}

async function sha256(text){
const encoder=new TextEncoder();
const data=encoder.encode(text);
const hash=await crypto.subtle.digest("SHA-256",data);
return Array.from(new Uint8Array(hash))
.map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function login(){
const user=userSelect.value;
const pin=pinInput.value;
const hash=await sha256(pin);
if(hash===PIN_HASH[user]){
currentUser=user;
localStorage.setItem("bk_user",user);
loginPage.classList.add("hidden");
appPage.classList.remove("hidden");
loadData();
}else alert("PIN salah");
}

function logout(){
localStorage.removeItem("bk_user");
location.reload();
}

function toggleDark(){document.body.classList.toggle("dark");}

function autoKategori(desc){
desc=desc.toLowerCase();
if(desc.includes("makan")||desc.includes("kopi")) return "Makan";
if(desc.includes("bensin")||desc.includes("tol")) return "Transport";
if(desc.includes("listrik")||desc.includes("air")) return "Tagihan";
if(desc.includes("gaji")) return "Gaji";
return "Lainnya";
}

function tambahTransaksi(){
let kategori=autoKategori(keterangan.value);

fetch(URL,{
method:"POST",
body:JSON.stringify({
action:"add",
user:currentUser,
tipe:tipe.value,
date:tanggal.value,
category:kategori,
description:keterangan.value,
amount:jumlah.value
})
}).then(()=>loadData());
}

function loadData(){
fetch(URL)
.then(r=>r.json())
.then(data=>{
const transaksi=data.transaksi.filter(t=>t.user===currentUser);
render(transaksi);
});
}

function render(data){
let out=0,ins=0;
let mapKategori={};
let mapBulan={};
let html="";

data.forEach(t=>{
let amt=parseInt(t.amount);
if(t.tipe==="Pengeluaran"){
out+=amt;
mapKategori[t.category]=(mapKategori[t.category]||0)+amt;
let bulan=t.date.substring(0,7);
mapBulan[bulan]=(mapBulan[bulan]||0)+amt;
}else ins+=amt;

html+=`<div class="flex justify-between border-b py-2">
<div>${t.date} - ${t.description}</div>
<div>Rp ${amt.toLocaleString()}</div>
</div>`;
});

totalOut.innerText=out.toLocaleString();
totalIn.innerText=ins.toLocaleString();

let bulanUrut=Object.keys(mapBulan).sort();
let last3=bulanUrut.slice(-3);
let avg=0;
last3.forEach(b=>avg+=mapBulan[b]);
avg=last3.length?Math.round(avg/last3.length):0;

prediksi.innerText=avg.toLocaleString();
danaDarurat.innerText=(avg*12).toLocaleString();

riwayat.innerHTML=html;

if(chart1) chart1.destroy();
chart1=new Chart(chartKategori,{
type:"doughnut",
data:{labels:Object.keys(mapKategori),
datasets:[{data:Object.values(mapKategori)}]}
});

if(chart2) chart2.destroy();
chart2=new Chart(chartVs,{
type:"bar",
data:{labels:["Pengeluaran","Pemasukan"],
datasets:[{data:[out,ins]}]}
});

if(chart3) chart3.destroy();
chart3=new Chart(trendChart,{
type:"line",
data:{labels:bulanUrut,
datasets:[{label:"Trend Bulanan",
data:bulanUrut.map(b=>mapBulan[b]),
tension:0.3}]}
});
}

async function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
doc.text("Laporan "+currentUser,10,10);
doc.text("Pengeluaran: "+totalOut.innerText,10,20);
doc.text("Pemasukan: "+totalIn.innerText,10,30);
doc.save("Laporan_"+currentUser+".pdf");
}
</script>

</body>
</html>
