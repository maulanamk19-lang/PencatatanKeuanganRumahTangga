<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance Keluarga Maul & Ninda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

<div id="loginPage" class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm">
        <h2 class="text-2xl font-bold text-center mb-6">Login Keluarga</h2>
        <select id="userSelect" class="w-full p-3 border rounded-xl mb-4 bg-slate-50">
            <option value="Maul">Maul</option>
            <option value="Ninda">Ninda</option>
        </select>
        <input type="password" id="pinInput" placeholder="PIN" class="w-full p-3 border rounded-xl mb-6 text-center tracking-[0.5em] bg-slate-50">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Masuk</button>
    </div>
</div>

<div id="appPage" class="hidden max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold">💰 Smart Finance Keluarga</h1>
        <button onclick="logout()" class="text-red-500 font-bold text-sm">LOGOUT</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-emerald-500 text-white p-6 rounded-[2rem] shadow-lg">
            <p class="text-[10px] uppercase font-bold opacity-80">Total Pemasukan</p>
            <h2 id="totalIn" class="text-2xl font-bold">Rp 0</h2>
        </div>
        <div class="bg-rose-500 text-white p-6 rounded-[2rem] shadow-lg">
            <p class="text-[10px] uppercase font-bold opacity-80">Total Pengeluaran</p>
            <h2 id="totalOut" class="text-2xl font-bold">Rp 0</h2>
        </div>
        <div class="bg-blue-600 text-white p-6 rounded-[2rem] shadow-lg">
            <p class="text-[10px] uppercase font-bold opacity-80">Sisa Saldo Kas</p>
            <h2 id="sisaSaldo" class="text-2xl font-bold">Rp 0</h2>
        </div>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
        <div class="glass p-6 rounded-[2rem] shadow-sm h-fit">
            <h3 class="font-bold mb-4 text-sm">Tambah Transaksi</h3>
            <div class="space-y-3">
                <select id="tipe" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none" onchange="updateKategori()">
                    <option value="Pengeluaran">🔴 Pengeluaran</option>
                    <option value="Pemasukan">🟢 Pemasukan</option>
                </select>
                <input type="date" id="tanggal" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                <select id="category" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none"></select>
                <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                <input type="number" id="jumlah" placeholder="Jumlah" class="w-full p-3 bg-slate-100 rounded-xl text-sm border-none">
                <button onclick="tambahTransaksi()" id="btnSimpan" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-md">Simpan</button>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <h3 class="font-bold mb-4 text-sm">Riwayat Transaksi Keluarga</h3>
                <div id="riwayat" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll"></div>
            </div>
        </div>
    </div>
</div>

<script>
// GANTI DENGAN URL APPS SCRIPT BARU ANDA
const URL = "https://script.google.com/macros/s/AKfycbzx58MhGnhQrMKr-hQT0NqMb32qSrCMzBNzF9dHiLeg3gaTX2iweJrrsKTbfWOI5fNU/exec";
let currentUser = "";

const PIN_HASH = {
    "Maul": "41c991eb6a66242c0454191244278183ce58cf4a6bcd372f799e4b9cc01886af",
    "Ninda": "d54123de468bd42ea00dafbd777f85fe5fa1ff6404d9838c007953c25c92a1c5"
};

async function sha256(text) {
    const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function login() {
    const hash = await sha256(pinInput.value);
    if(hash === PIN_HASH[userSelect.value]) {
        currentUser = userSelect.value;
        localStorage.setItem("bk_user", currentUser);
        location.reload();
    } else alert("PIN Salah!");
}

function logout() { localStorage.removeItem("bk_user"); location.reload(); }

function updateKategori() {
    const tipe = document.getElementById('tipe').value;
    const catSelect = document.getElementById('category');
    
    const pengeluaranOpt = `
        <option value="🏠 Rumah">🏠 Rumah</option>
        <option value="🍚 Makan">🍚 Makan</option>
        <option value="🚗 Transport">🚗 Transport</option>
        <option value="✨ Sedekah">✨ Sedekah</option>
        <option value="🛍 Belanja">🛍 Belanja</option>
        <option value="📦 Lainnya">📦 Lainnya</option>`;
    
    const pemasukanOpt = `
        <option value="💰 Gaji">💰 Gaji Utama</option>
        <option value="👞 Usaha Sampingan">👞 Usaha (Sol Sepatu)</option>
        <option value="🎁 Bonus">🎁 Bonus/Hadiah</option>
        <option value="🔄 Refund">🔄 Refund/Kembalian</option>
        <option value="➕ Lain-lain">➕ Lain-lain</option>`;
    
    catSelect.innerHTML = tipe === "Pengeluaran" ? pengeluaranOpt : pemasukanOpt;
}

async function tambahTransaksi() {
    const amt = document.getElementById('jumlah').value;
    if(!amt) return alert("Isi jumlah!");
    btnSimpan.innerText = "Menyimpan...";
    await fetch(URL, {
        method: "POST",
        body: JSON.stringify({
            action: "add",
            user: currentUser,
            tipe: tipe.value,
            date: tanggal.value,
            category: category.value,
            description: keterangan.value,
            amount: parseInt(amt)
        })
    });
    loadData();
    document.getElementById('jumlah').value = "";
    document.getElementById('keterangan').value = "";
    btnSimpan.innerText = "Simpan";
}

function loadData() {
    fetch(URL).then(r => r.json()).then(data => {
        let out = 0, ins = 0, html = "";
        data.transaksi.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            let amt = parseInt(t.amount) || 0;
            if(t.tipe === "Pengeluaran") out += amt; else ins += amt;

            html += `
            <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-bold text-blue-600 uppercase">${t.category}</span>
                        <span class="text-[8px] px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-bold uppercase">${t.user}</span>
                    </div>
                    <div class="text-sm font-semibold text-slate-700">${t.description}</div>
                    <div class="text-[9px] text-slate-400">${t.date}</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-sm ${t.tipe === 'Pemasukan' ? 'text-emerald-600' : 'text-slate-800'}">
                        ${t.tipe === 'Pemasukan' ? '+' : ''}Rp ${amt.toLocaleString('id-ID')}
                    </div>
                    <button onclick="hapusTransaksi('${t.id}')" class="text-[8px] text-red-400 font-bold uppercase hover:text-red-600 transition">Hapus</button>
                </div>
            </div>`;
        });
        totalOut.innerText = "Rp " + out.toLocaleString('id-ID');
        totalIn.innerText = "Rp " + ins.toLocaleString('id-ID');
        sisaSaldo.innerText = "Rp " + (ins - out).toLocaleString('id-ID');
        riwayat.innerHTML = html || "<p class='text-center text-xs opacity-50 py-10'>Belum ada transaksi</p>";
    });
}

async function hapusTransaksi(id) {
    if(!confirm("Hapus transaksi?")) return;
    await fetch(URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
    loadData();
}

window.onload = function() {
    const saved = localStorage.getItem("bk_user");
    if(saved) {
        currentUser = saved;
        loginPage.classList.add("hidden");
        appPage.classList.remove("hidden");
        updateKategori();
        loadData();
    }
    document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
}
</script>
</body>
</html>
